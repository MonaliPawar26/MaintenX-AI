version: '3.9'

# ════════════════════════════════════════════════════════════════
#  MaintenX AI – Full Stack Docker Compose
#  Services: MongoDB · Backend API · Python AI · Nginx Frontend
# ════════════════════════════════════════════════════════════════

services:

  # ── MONGODB ────────────────────────────────────────────────
  mongodb:
    image: mongo:7.0
    container_name: maintenx-mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
      - ./mongo-init/init.js:/docker-entrypoint-initdb.d/init.js:ro
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: maintenx
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - maintenx-net

  # ── EXPRESS BACKEND ────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: maintenx-backend
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
      ai-service:
        condition: service_started
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      NODE_ENV: production
      MONGODB_URI: mongodb://mongodb:27017/maintenx
      JWT_SECRET: ${JWT_SECRET:-maintenx_default_secret_CHANGE_IN_PRODUCTION}
      JWT_EXPIRES_IN: 7d
      AI_SERVICE_URL: http://ai-service:8000
      FRONTEND_URL: http://localhost:3000
      ALLOWED_ORIGINS: http://localhost:3000,http://localhost:5500
      RATE_LIMIT_MAX: 500
    volumes:
      - backend_logs:/app/logs
    networks:
      - maintenx-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── PYTHON AI SERVICE ──────────────────────────────────────
  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: maintenx-ai
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      PYTHONUNBUFFERED: "1"
    networks:
      - maintenx-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 20s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── NGINX (serves frontend + reverse proxy) ────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: maintenx-nginx
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:80"
      - "3443:443"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    networks:
      - maintenx-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  mongo_data:    { driver: local }
  backend_logs:  { driver: local }

networks:
  maintenx-net:
    driver: bridge
